[env:nano_r4]
platform = renesas-ra
board = nano_r4
framework = arduino
lib_deps = throwtheswitch/Unity@^2.6.0

[env:native]
platform = native
test_framework = unity
build_flags = -DUNIT_WEAK_ATTRIBUTE
